# local-UNO を nginx のサブパス /luno で配信するための location スニペット。
#
# このマシンで port 80 を待ち受けている既存 server ブロック
# （/etc/nginx/sites-enabled/jupyter.conf の `listen 80 default_server;` のサーバ）
# の中に、以下の 2 つの location を追記する。metabase/cli と同じ「末尾スラの
# リダイレクト＋プレフィックス除去 proxy_pass」の流儀に合わせてある。
#
# 前提: local-UNO 本体が 127.0.0.1:8000 で稼働していること（deploy/luno.service 参照）。
# フロントは全 URL をベース相対で組むため、nginx 側で /luno/ を除去して root 配信の
# アプリへ渡すだけで、アセット・/ws・/cards すべてが正しく解決される。

# 末尾スラ無し (/luno) は必ず /luno/ へ寄せる（相対 URL の基準を /luno/ に固定するため）。
location = /luno {
    return 301 /luno/;
}

# local-UNO 本体（uvicorn）。proxy_pass 末尾の "/" が肝で、/luno/ プレフィックスを
# 除去して転送する（例: /luno/app.js → /app.js、/luno/ws → /ws、/luno/cards/x.png → /cards/x.png）。
location /luno/ {
    proxy_pass http://127.0.0.1:8000/;

    # クライアント情報
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket 必須（/luno/ws の Upgrade を通す）
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # 対局中は WS を張りっぱなしにするため長めに（jupyter/metabase と同値）
    proxy_read_timeout 86400;
}
