name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一 PR/ブランチの古い実行はキャンセルする
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# checkout とテスト実行のみで書き込みは不要。最小権限にする
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Sync (locked, dev extra)
        # --locked で uv.lock ドリフトを検知する（依存変更時に lock 更新漏れがあれば失敗）
        # Python 3.11 は .python-version により uv が自動取得する
        run: uv sync --locked --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Test (pytest)
        run: uv run pytest -q
